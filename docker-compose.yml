# ── 核心基礎服務（永遠需要）────────────────────────────────────────────────────
# 包含：postgres、backend、stt-tts-unified（backend 的 STT/TTS HTTP API）
# 不包含：agent、ollama（依模式搭配對應 compose 檔）

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tutor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tutor}
      POSTGRES_DB: ${POSTGRES_DB:-tutordb}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tutor} -d ${POSTGRES_DB:-tutordb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tutor-net

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    ports:
      - "8118:8000"
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://tutor:tutor@postgres:5432/tutordb}
    depends_on:
      postgres:
        condition: service_healthy
      tts:
        condition: service_started
    networks:
      - tutor-net
    volumes:
      - ./backend-fastapi/app:/app/app
      - tts-cache:/app/tts_cache

  # ── stt-tts-unified（backend 使用的 HTTP STT/TTS API）───────────────────────
  tts:
    build:
      context: ./libs/stt-tts-unified
      dockerfile: Dockerfile
    environment:
      - UPLOAD_DIR=data/uploads
      - RESULT_DIR=data/results
      - AUDIO_DIR=data/audio
      - DB_PATH=data/history.db
      - DEFAULT_WHISPER_MODEL=base
      - DEFAULT_TTS_VOICE=en-US-JennyNeural
      - CORS_ALLOW_ORIGINS=http://backend:8000
    networks:
      - tutor-net
    restart: unless-stopped

volumes:
  postgres-data:
  tts-cache:

networks:
  tutor-net:
    driver: bridge
    name: tutor-net
